name: Performance (Staging)

on:
  push:
    branches: [main]

concurrency:
  group: perf-staging
  cancel-in-progress: true

jobs:
  # ─── k6 Load Test ──────────────────────────────────────────
  k6-load:
    name: k6 Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run Load Test
        run: |
          k6 run tests/performance/k6/scenarios/load.js \
            --out json=tests/performance/reports/k6-load.json \
            --summary-export=tests/performance/reports/k6-load-summary.json
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          SUPABASE_URL: ${{ secrets.PERF_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PERF_SUPABASE_ANON_KEY }}
          TEST_USER_EMAIL: ${{ secrets.PERF_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.PERF_TEST_USER_PASSWORD }}

      - name: Upload Load Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-load-results
          path: tests/performance/reports/
          retention-days: 30

  # ─── k6 Stress Test ────────────────────────────────────────
  k6-stress:
    name: k6 Stress Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [k6-load]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run Stress Test
        run: |
          k6 run tests/performance/k6/scenarios/stress.js \
            --out json=tests/performance/reports/k6-stress.json \
            --summary-export=tests/performance/reports/k6-stress-summary.json
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          SUPABASE_URL: ${{ secrets.PERF_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PERF_SUPABASE_ANON_KEY }}
          TEST_USER_EMAIL: ${{ secrets.PERF_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.PERF_TEST_USER_PASSWORD }}

      - name: Upload Stress Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-stress-results
          path: tests/performance/reports/
          retention-days: 30

  # ─── Lighthouse CI (Strict) ────────────────────────────────
  lighthouse-ci:
    name: Lighthouse CI (Strict)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-service-role-key' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI (Strict)
        run: |
          npm install -g @lhci/cli
          lhci autorun --config=tests/performance/lighthouse/lighthouserc.js
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

      - name: Upload Lighthouse Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-staging-reports
          path: tests/performance/reports/lighthouse/
          retention-days: 30
