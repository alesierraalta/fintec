name: CI

on:
  push:
  pull_request:

jobs:
  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-service-role-key' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: Build
        run: npm run build

  e2e-no-auth:
    name: E2E no-auth
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'test-service-role-key' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Validate Playwright lane (no-auth)
        run: npm run e2e:validate-lane
        env:
          PLAYWRIGHT_LANE: no-auth
          PLAYWRIGHT_NO_AUTH_SETUP: '1'
          FRONTEND_AUTH_BYPASS: '1'

      - name: Run Playwright no-auth lane
        run: npm run e2e:ci:no-auth

  e2e-auth-required:
    name: E2E auth-required
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_KEY }}
      FINTEC_TEST_USER_EMAIL: ${{ secrets.FINTEC_TEST_USER_EMAIL }}
      FINTEC_TEST_USER_PASSWORD: ${{ secrets.FINTEC_TEST_USER_PASSWORD }}
      FINTEC_TEST_USER_NAME: ${{ secrets.FINTEC_TEST_USER_NAME }}
      FINTEC_TEST_USER_BASE_CURRENCY: ${{ secrets.FINTEC_TEST_USER_BASE_CURRENCY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Validate staging host
        run: |
          if [ "$NEXT_PUBLIC_SUPABASE_URL" != "https://bfxkcmoccqgvkrrkkdju.supabase.co" ]; then
            echo "FAIL: staging URL does not match expected host"
            exit 1
          fi
          echo "OK: staging URL verified"

      - name: Validate Playwright lane (auth-required)
        run: npm run e2e:validate-lane
        env:
          PLAYWRIGHT_LANE: auth-required

      - name: Run Playwright auth-required lane
        run: npm run e2e:ci:auth-required
